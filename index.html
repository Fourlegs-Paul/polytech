<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes 통합 콘솔 — 채팅 + 실시간 노드 그래프</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #0b1020; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #1e293b; }
    h1 { font-size: 17px; } h1 .accent { color: #818cf8; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #94a3b8; background: #111827; padding: 6px 12px; border-radius: 999px; border: 1px solid #1f2937; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; }
    .dot.live { background: #22c55e; animation: pulse 1.6s infinite; }
    .dot.off { background: #ef4444; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 70%{box-shadow:0 0 0 8px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 360px; min-height: 0; }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

    .graph-wrap { position: relative; border-right: 1px solid #1e293b; overflow: hidden; }
    svg { width: 100%; height: 100%; display: block; }
    .node-rect { fill: #1e293b; stroke: #334155; stroke-width: 1.5; transition: fill .25s, stroke .25s; cursor: grab; }
    .node.active .node-rect { fill: #312e81; stroke: #818cf8; }
    .node.fired .node-rect { fill: #4338ca; stroke: #a5b4fc; }
    .node.tg .node-rect { fill: #0f2e2e; stroke: #14b8a6; }
    .node-label { fill: #e2e8f0; font-size: 13px; font-weight: 600; pointer-events: none; }
    .node-sub { fill: #94a3b8; font-size: 10px; pointer-events: none; }
    .edge { stroke: #334155; stroke-width: 2; fill: none; }
    .edge.flow { stroke: #818cf8; stroke-dasharray: 6 6; animation: dash .6s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -12; } }
    .pulse-dot { fill: #a5b4fc; }
    .graphbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; }
    .graphbar button { font-size: 11px; padding: 6px 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #cbd5e1; cursor: pointer; }
    .graphbar .legend { font-size: 11px; color: #64748b; align-self: center; }

    .side { display: flex; flex-direction: column; min-height: 0; background: #0f172a; }
    .tabs { display: flex; border-bottom: 1px solid #1e293b; }
    .tabs button { flex: 1; padding: 10px; background: none; border: none; color: #94a3b8; font-size: 13px; cursor: pointer; }
    .tabs button.active { color: #e2e8f0; border-bottom: 2px solid #818cf8; }

    .chat { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 85%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 3px; }
    .msg.hermes { align-self: flex-start; background: #1e293b; color: #cbd5e1; border-bottom-left-radius: 3px; }
    .msg.tg { align-self: flex-start; background: #0f2e2e; color: #99f6e4; border-bottom-left-radius: 3px; border: 1px solid #14b8a6; }
    .msg .who { font-size: 10px; opacity: .6; display: block; margin-bottom: 3px; }
    .input-row { display: flex; padding: 10px; border-top: 1px solid #1e293b; gap: 8px; }
    .input-row input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #334155; background: #020617; color: #e2e8f0; font-size: 13px; }
    .input-row button { padding: 10px 16px; border-radius: 10px; border: none; background: #4f46e5; color: #fff; font-weight: 600; cursor: pointer; }

    .log { flex: 1; overflow-y: auto; padding: 10px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; line-height: 1.6; color: #7dd3fc; background: #020617; }
    .log .t { color: #475569; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>📡 Hermes <span class="accent">통합 콘솔</span> — 채팅 + 실시간 노드 그래프</h1>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">연결 중…</span></div>
  </header>

  <div class="main">
    <div class="graph-wrap">
      <div class="graphbar">
        <button id="btnWeb">▶ 웹 흐름</button>
        <button id="btnTg">▶ 텔레그램 흐름</button>
        <span class="legend">노드 드래그로 위치 수정 · 자동 저장</span>
      </div>
      <svg id="graph" viewBox="0 0 1000 520" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <div class="side">
      <div class="tabs">
        <button id="tabChat" class="active">💬 채팅</button>
        <button id="tabLog">📜 이벤트 로그</button>
      </div>
      <div id="chatView" class="chat"></div>
      <div id="logView" class="log hidden"></div>
      <div class="input-row">
        <input id="chatInput" placeholder="Hermes에게 메시지… (엔터 전송)" />
        <button id="chatSend">전송</button>
      </div>
    </div>
  </div>

  <script>
    const SVGNS = 'http://www.w3.org/2000/svg';
    const W = 150, H = 64;
    const svg = document.getElementById('graph');
    let GRAPH = { nodes: [], edges: [], paths: {} };
    const nodeEls = {}, edgeEls = {};

    function edgePath(a, b) {
      const x1 = a.x + W/2, y1 = a.y + H/2, x2 = b.x + W/2, y2 = b.y + H/2, mx = (x1+x2)/2;
      return `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    }
    function renderGraph() {
      svg.innerHTML = '';
      Object.keys(nodeEls).forEach(k => delete nodeEls[k]);
      Object.keys(edgeEls).forEach(k => delete edgeEls[k]);
      GRAPH.edges.forEach(([a,b]) => {
        const p = document.createElementNS(SVGNS,'path');
        p.setAttribute('d', edgePath(byId(a), byId(b))); p.setAttribute('class','edge');
        svg.appendChild(p); edgeEls[a+'->'+b] = p;
      });
      GRAPH.nodes.forEach(n => {
        const g = document.createElementNS(SVGNS,'g'); g.setAttribute('class','node'+(n.id.startsWith('tg')?' tg':''));
        g.setAttribute('transform',`translate(${n.x},${n.y})`);
        const r = document.createElementNS(SVGNS,'rect'); r.setAttribute('class','node-rect'); r.setAttribute('width',W); r.setAttribute('height',H); r.setAttribute('rx',12);
        const l = document.createElementNS(SVGNS,'text'); l.setAttribute('class','node-label'); l.setAttribute('x',W/2); l.setAttribute('y',H/2-4); l.setAttribute('text-anchor','middle'); l.textContent=n.label;
        const s = document.createElementNS(SVGNS,'text'); s.setAttribute('class','node-sub'); s.setAttribute('x',W/2); s.setAttribute('y',H/2+12); s.setAttribute('text-anchor','middle'); s.textContent=n.sub||'';
        g.appendChild(r); g.appendChild(l); g.appendChild(s); svg.appendChild(g); nodeEls[n.id]=g;
        enableDrag(g, n);
      });
    }
    function byId(id){ return GRAPH.nodes.find(n=>n.id===id); }
    function enableDrag(g, n) {
      let dragging=false, ox=0, oy=0;
      g.addEventListener('mousedown', e=>{ dragging=true; const pt=svgPoint(e); ox=pt.x-n.x; oy=pt.y-n.y; });
      window.addEventListener('mousemove', e=>{ if(!dragging)return; const pt=svgPoint(e); n.x=Math.round(pt.x-ox); n.y=Math.round(pt.y-oy); g.setAttribute('transform',`translate(${n.x},${n.y})`); refreshEdges(); });
      window.addEventListener('mouseup', ()=>{ if(dragging){ dragging=false; saveGraph(); } });
    }
    function svgPoint(e){ const r=svg.getBoundingClientRect(); const vb=svg.viewBox.baseVal; return { x:(e.clientX-r.left)/r.width*vb.width, y:(e.clientY-r.top)/r.height*vb.height }; }
    function refreshEdges(){ GRAPH.edges.forEach(([a,b])=>{ edgeEls[a+'->'+b] && edgeEls[a+'->'+b].setAttribute('d', edgePath(byId(a), byId(b))); }); }
    function saveGraph(){ fetch('/api/graph',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(GRAPH)}); }
    function resetGraph(){ Object.values(edgeEls).forEach(e=>e.classList.remove('flow')); Object.values(nodeEls).forEach(n=>n.classList.remove('active','fired')); }
    function firePath(pathKey){
      resetGraph(); const path=GRAPH.paths[pathKey]||[]; let i=0;
      function step(){
        if(i>=path.length-1){ log('✔ 흐름 완료 ('+pathKey+')'); return; }
        const a=path[i], b=path[i+1]; const e=edgeEls[a+'->'+b];
        if(e) e.classList.add('flow'); nodeEls[a]&&nodeEls[a].classList.add('fired'); nodeEls[b]&&nodeEls[b].classList.add('active');
        log('→ '+a+' ⇒ '+b); setTimeout(()=>{ if(e) e.classList.remove('flow'); }, 700); i++; setTimeout(step, 550);
      } step();
    }

    // 로그
    const logEl=document.getElementById('logView');
    function log(m){ const t=new Date().toLocaleTimeString('ko-KR'); const d=document.createElement('div'); d.innerHTML=`<span class="t">[${t}]</span> ${m}`; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; }

    // 채팅
    const chatEl=document.getElementById('chatView');
    function addMsg(from, text, cls){
      const d=document.createElement('div'); d.className='msg '+cls;
      const who = cls==='user'?'나':(cls==='tg'?('📱 '+from):'🤖 Hermes');
      d.innerHTML=`<span class="who">${who}</span>${escapeHtml(text)}`; chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight;
    }
    function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    async function sendChat(){
      const inp=document.getElementById('chatInput'); const text=inp.value.trim(); if(!text)return;
      inp.value=''; addMsg('me', text, 'user'); firePath('web');
      const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      const j=await r.json(); if(!j.ok) addMsg('hermes','⚠ 전송 실패', 'hermes');
    }
    document.getElementById('chatSend').onclick=sendChat;
    document.getElementById('chatInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendChat(); });
    document.getElementById('btnWeb').onclick=()=>firePath('web');
    document.getElementById('btnTg').onclick=()=>firePath('telegram');
    document.getElementById('tabChat').onclick=()=>{ document.getElementById('chatView').classList.remove('hidden'); document.getElementById('logView').classList.add('hidden'); document.getElementById('tabChat').classList.add('active'); document.getElementById('tabLog').classList.remove('active'); };
    document.getElementById('tabLog').onclick=()=>{ document.getElementById('logView').classList.remove('hidden'); document.getElementById('chatView').classList.add('hidden'); document.getElementById('tabLog').classList.add('active'); document.getElementById('tabChat').classList.remove('active'); };

    // SSE
    const statusDot=document.getElementById('statusDot'), statusText=document.getElementById('statusText');
    function connect(){
      const es=new EventSource('/events');
      es.onopen=()=>{ statusDot.className='dot live'; statusText.textContent='실시간 연결됨 (SSE)'; log('🔌 /events 연결'); };
      es.onmessage=ev=>{ let d; try{d=JSON.parse(ev.data);}catch{return;}
        if(d.type==='hello'){ statusDot.className='dot '+(d.botOnline?'live':'off'); statusText.textContent='봇 '+(d.botOnline?'ONLINE':'offline'); }
        else if(d.type==='graph'){ GRAPH=d.graph; renderGraph(); log('📐 그래프 로드 ('+GRAPH.nodes.length+'노드)'); }
        else if(d.type==='message'){
          if(d.source==='web' && d.from==='hermes'){ addMsg('hermes', d.text, 'hermes'); }
          else if(d.source==='telegram'){ addMsg(d.from, d.text, 'tg'); firePath('telegram'); }
        }
      };
      es.onerror=()=>{ statusDot.className='dot off'; statusText.textContent='연결 끊김 — 재시도…'; };
    }
    connect(); log('콘솔 로드 완료.');
  </script>
</body>
</html>
